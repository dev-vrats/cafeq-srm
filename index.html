<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  <title>CaféQ — SRM Nescafé | Login</title>
  <meta name="description" content="CaféQ — Pre-order your coffee from SRM Nescafé kiosk. Skip the queue, pick up on your schedule." />
  <meta name="theme-color" content="#1A0A06" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div id="toast-container"></div>

  <main class="auth-page">
    <!-- Brand -->
    <header class="auth-brand">
      <span class="auth-brand-sub">Pre-Order App</span>
    </header>

    <!-- Auth Card -->
    <article class="glass-heavy auth-card">
      <h1 id="card-title" class="auth-card-title">Welcome back</h1>
      <p id="card-sub" class="auth-card-subtitle">Sign in to your CaféQ account</p>

      <!-- Tab Toggle -->
      <div class="auth-tabs" role="tablist">
        <button id="login-tab" class="auth-tab active" role="tab" aria-selected="true" aria-controls="auth-form">
          Sign In
        </button>
        <button id="signup-tab" class="auth-tab" role="tab" aria-selected="false" aria-controls="auth-form">
          Sign Up
        </button>
      </div>

      <!-- Error Box -->
      <div id="auth-error" class="auth-error hidden" role="alert">
        <span class="material-symbols-rounded" style="font-size:1.125rem">warning</span>
        <span id="error-msg"></span>
      </div>

      <!-- Form -->
      <form id="auth-form" class="auth-form" novalidate>
        <!-- Name (signup only) -->
        <div id="name-field" class="input-group name-field hidden-field">
          <label for="name-input" class="input-label">Your Name</label>
          <div class="input-wrapper">
            <span class="material-symbols-rounded input-icon">person</span>
            <input
              id="name-input"
              type="text"
              class="input-field"
              placeholder="Dev Trivedi"
              autocomplete="name"
              tabindex="1"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label for="email-input" class="input-label">Email Address</label>
          <div class="input-wrapper">
            <span class="material-symbols-rounded input-icon">mail</span>
            <input
              id="email-input"
              type="email"
              class="input-field"
              placeholder="you@srmcem.ac.in"
              autocomplete="email"
              tabindex="2"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="pass-input" class="input-label">Password</label>
          <div class="input-wrapper">
            <span class="material-symbols-rounded input-icon">lock</span>
            <input
              id="pass-input"
              type="password"
              class="input-field"
              placeholder="Min. 6 characters"
              autocomplete="current-password"
              tabindex="3"
            />
            <button type="button" id="eye-btn" class="input-eye" aria-label="Toggle password visibility">
              <span class="material-symbols-rounded" id="eye-icon">visibility</span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button id="auth-submit" type="button" class="btn btn-primary auth-submit" tabindex="4">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader">
            <span class="spinner" style="border-color:rgba(26,10,6,0.2);border-top-color:#1A0A06"></span>
          </span>
        </button>
      </form>
    </article>

    <!-- Feature pills -->
    <div class="auth-features" aria-label="App features">
      <div class="auth-feature-pill"><span class="material-symbols-rounded" style="font-size:1rem">schedule</span> Slot Booking</div>
      <div class="auth-feature-pill"><span class="material-symbols-rounded" style="font-size:1rem">speed</span> Live Rush Meter</div>
      <div class="auth-feature-pill"><span class="material-symbols-rounded" style="font-size:1rem">loyalty</span> Rewards</div>
      <div class="auth-feature-pill"><span class="material-symbols-rounded" style="font-size:1rem">group</span> Group Orders</div>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
