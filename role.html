<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>CaféQ - Who are you?</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
  
  <style>
    .role-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .role-card {
      width: 100%;
      max-width: 400px;
      padding: 32px 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 8px 32px var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .role-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .role-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .role-btn {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 16px;
      font-size: 1.125rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform var(--duration-fast) var(--ease-bounce), opacity var(--duration-fast);
    }
    .role-btn:active { transform: scale(0.97); }
    
    .btn-customer {
      background: var(--gold);
      color: var(--bg-main);
    }
    .btn-owner {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .error-box {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 12px;
      color: #ff8888;
      font-size: 0.875rem;
      display: none;
    }
  </style>
</head>
<body>
  
  <div class="role-container">
    <div class="role-card">
      <h1 class="role-title">Welcome to CaféQ</h1>
      <p class="role-sub">How would you like to continue?</p>
      
      <button id="btn-customer" class="role-btn btn-customer">
        <span class="material-symbols-rounded">local_cafe</span>
        I am a Customer
      </button>
      
      <button id="btn-owner" class="role-btn btn-owner">
        <span class="material-symbols-rounded">storefront</span>
        I am the Cafe Owner
      </button>
      
      <div id="role-error" class="error-box"></div>
    </div>
  </div>

  <script type="module" src="js/role.js"></script>
</body>
</html>
